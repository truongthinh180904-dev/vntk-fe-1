    /* Cố định form */
    #dtc-search-form {
      position: fixed !important;
      top: 0px; /* cách top 100px */
      left: 50%;
      transform: translateX(-50%);
      width: 100% !important;
      background: white;
      border: 0 !important;
      border-radius: 0 !important;
      padding-top: 100px;
      z-index: 999 !important; /* luôn ở trên */
    }

    /* Loại bỏ thanh cuộn của toàn trang */
    html, body {
      overflow: hidden;
      margin: 0;
      padding: 0;
      font-family: 'Be Vietnam Pro', sans-serif;
    }
    @media (max-width: 768px) {
    #dtcListAirport
    {
        z-index: 99999 !important;
        width: 90% !important;
        height: 100vh !important;
        top: 150px !important;
    }
    /* --- Tab style override for mobile itinerary select --- */
    #dtc-itin-mobile {
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      gap: 10px !important;
      background: #fff !important;
      border-radius: 6px !important;
      box-shadow: 0 0 5px rgba(0,0,0,0.1) !important;
      padding: 6px !important;
    }

    #dtc-itin-mobile .dtc-form-radio {
      flex: 1 !important;
      text-align: center !important;
      margin: 0 !important;
      border-radius: 6px !important;
      transition: all 0.3s ease !important;
    }

    #dtc-itin-mobile .dtc-form-radio-input {
      display: none !important;
    }

    /* Label becomes the clickable tab */
    #dtc-itin-mobile .dtc-form-radio-label {
      display: block !important;
      width: 100% !important;
      padding: 8px 0 !important;
      border-radius: 6px !important;
      font-weight: 500 !important;
      color: #333 !important;
      background: #f1f1f1 !important;
      cursor: pointer !important;
      transition: all 0.3s ease !important;
      font-size: 14px !important;
    }

    /* Active tab */
    #dtc-itin-mobile .dtc-form-radio-input:checked + .dtc-form-radio-label {
      background: #007bff !important;
      color: #fff !important;
      font-weight: 600 !important;
      box-shadow: 0 0 0 2px rgba(0,123,255,0.3) !important;
    }

    /* Remove separator lines */
    #dtc-itin-mobile .dtc-separate-vertical {
      display: none !important;
    }
    .dtc-date-icon{
      display: none !important;
    }
    }
    
    #dtcListAirport.dtc-open {
    position: absolute !important; /* Hoặc absolute/fixed tùy vào cấu trúc layout của bạn */
    z-index: 99999 !important;
}

   <script>
    function showToast(message) {
    Swal.fire({
        icon: 'success',
        title: message,
        position: 'center',
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true,
        // didClose: () => {
        //     // sau khi toast tắt thì chuyển hướng
        //     window.location.href = "/";
        // }
    });
}
// Thêm vào cuối thẻ <script> trong file HTML của bạn
const observer = new MutationObserver(() => {
    // 1. Check dropdown địa điểm (dùng class dtc-open)
    const airportDropdown = document.querySelector('#dtcListAirport');
    const isAirportOpen = airportDropdown && airportDropdown.classList.contains('dtc-open');
    
    // 2. Check lịch (kiểm tra xem thẻ .calendar có tồn tại trên màn hình không)
    // Plugin này thường render .calendar vào cuối body khi cần dùng
    const calendar = document.querySelector('.calendar');
    const isCalendarOpen = calendar && (calendar.style.display !== 'none');

    // 3. Gộp cả 2: Chỉ cần 1 trong 2 cái mở là báo Next.js mở to Iframe ngay
    const isOpen = isAirportOpen || isCalendarOpen;
    
    window.parent.postMessage({
        type: 'TOGGLE_FLIGHT_DROPDOWN',
        isOpen: !!isOpen // Trả về true nếu có bất kỳ cái nào mở
    }, '*');
});

// THEO DÕI TOÀN BỘ BODY: 
// - attributes: để bắt khi .calendar đổi style display
// - childList: để bắt khi plugin chèn thêm thẻ .calendar vào DOM
// - subtree: để bắt mọi thay đổi ở các cấp sâu bên trong
const targetNode = document.querySelector('body'); 
observer.observe(targetNode, { 
    attributes: true, 
    childList: true, 
    subtree: true,
    attributeFilter: ['class', 'style'] 
});
    </script>


  <div id="dtc-plugin" data-flight-url="/tim-kiem-chuyen-bay" data-key="DTC10978"></div>
