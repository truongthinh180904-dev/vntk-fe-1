<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Tìm kiếm chuyến bay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <style>
    /* Header */
    .flight-header {
      position: absolute;
      top: -69px;
      left: 0;
      right: 0;
      background: rgba(79, 141, 240, 0.2);
      backdrop-filter: blur(5px);
      border-radius: 10px 10px 0 0;
      color: white;
      text-align: center;
      padding: 15px;
      z-index: 10;
      height:70px;
    }
    .flight-header h4 {
      margin-top: 5px;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

  #dtc-search-form {
    position: fixed !important;
    top: 100px;
    left: 50%;
    transform: translateX(-50%);
    width: 100% !important;
    border: 1px solid rgba(49, 147, 204, 0.15) !important;
    border-radius: 0 0 8px 8px !important; /* bo tròn 2 góc dưới */
    padding-top: 100px;
    z-index: 999 !important;
  }


    /* Loại bỏ thanh cuộn của toàn trang */    
    html, body {
      overflow: hidden;
      margin: 0;
      padding: 0;
      font-family: 'Be Vietnam Pro', sans-serif;
    }
@media (max-width: 768px) {
  #dtcListAirport
  {
    z-index: 99999 !important;
    width: 42vh !important;
    height: 100vh !important;
    left:20px !important;
    top: 346px !important;
  }
    #dtc-search-form {
      top: 175px; /* cách top 100px  */
      width: 100% !important;
    }
    .dtc-search-input
    {
      background-color:rgb(255, 255, 255) ;
    }


    /* --- Tab style override for mobile itinerary select --- */
#dtc-itin-mobile {
  display: flex !important;
  justify-content: center !important;
  align-items: center !important;
  gap: 10px !important;
  background: #fff !important;
  border-radius: 6px !important;
  box-shadow: 0 0 5px rgba(0,0,0,0.1) !important;
  padding: 6px !important;
}

#dtc-itin-mobile .dtc-form-radio {
  flex: 1 !important;
  text-align: center !important;
  margin: 0 !important;
  border-radius: 6px !important;
  transition: all 0.3s ease !important;
}

#dtc-itin-mobile .dtc-form-radio-input {
  display: none !important;
}

/* Label becomes the clickable tab */
#dtc-itin-mobile .dtc-form-radio-label {
  display: block !important;
  width: 100% !important;
  padding: 8px 0 !important;
  border-radius: 6px !important;
  font-weight: 500 !important;
  color: #333 !important;
  background: #f1f1f1 !important;
  cursor: pointer !important;
  transition: all 0.3s ease !important;
  font-size: 14px !important;
}

/* Active tab */
#dtc-itin-mobile .dtc-form-radio-input:checked + .dtc-form-radio-label {
  background: #007bff !important;
  color: #fff !important;
  font-weight: 600 !important;
  box-shadow: 0 0 0 2px rgba(0,123,255,0.3) !important;
}

/* Remove separator lines */
#dtc-itin-mobile .dtc-separate-vertical {
  display: none !important;
}
.dtc-date-icon{
  display: none !important;
}
}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>
<body>
  

<script>
function showToast(message) {
    Swal.fire({
        icon: 'success',
        title: message,
        position: 'center',
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true,
        didClose: () => {
            // sau khi toast tắt thì chuyển hướng
            window.location.href = "/";
        }
    });
}
</script>

  
  <div id="dtc-plugin" data-flight-url="/tim-kiem-chuyen-bay" data-key="DTC10978"></div>

  <script src="/js/plugincustom.js" asp-append-version="true"></script>


</body>
</html>
