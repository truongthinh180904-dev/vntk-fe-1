<script>
  
function showToast(message) {
    Swal.fire({
        icon: 'success',
        title: message,
        position: 'center',
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true,
        didClose: () => {
            // sau khi toast tắt thì chuyển hướng
            window.location.href = "/";
        }
    });
}
</script>
